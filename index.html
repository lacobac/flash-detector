<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Pro Flash Detector</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #111;
        color: white;
    }

    video {
        width: 90%;
        max-width: 400px;
        margin-top: 20px;
        border: 2px solid #444;
    }

    button {
        font-size: 20px;
        padding: 10px 20px;
        margin-top: 20px;
    }

    #info {
        margin-top: 10px;
        font-size: 14px;
        color: #aaa;
    }
</style>
</head>

<body>

<h1>Pro Flash Detector</h1>

<button onclick="start()">Start</button>

<br>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<div id="info">Waiting for calibration...</div>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let info = document.getElementById('info');

// signal state
let baseline = 0;          // ambient light level
let noise = 5;             // estimated noise level
let lastBeep = 0;

// smoothing buffer
let smoothed = 0;

// audio
let audioCtx = null;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep() {
    if (!audioCtx) return;

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 1000;
    gain.gain.value = 0.2;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

// 📷 camera
function start() {

    initAudio();

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    })
    .then(stream => {
        video.srcObject = stream;

        // start calibration phase
        baseline = 0;
        noise = 5;

        requestAnimationFrame(loop);
    })
    .catch(err => {
        alert("Kamera nepovolená: " + err);
    });
}

// brightness
function getBrightness(imageData) {
    let data = imageData.data;
    let sum = 0;

    for (let i = 0; i < data.length; i += 4) {
        sum += 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
    }

    return sum / (data.length / 4);
}

// main loop
let frameCount = 0;

function loop() {

    if (video.videoWidth === 0) {
        requestAnimationFrame(loop);
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let brightness = getBrightness(frame);

    // smoothing (noise reduction)
    smoothed = smoothed * 0.9 + brightness * 0.1;

    frameCount++;

    // ----------------------------
    // 1. CALIBRATION PHASE (first ~60 frames ≈ 1–2 sec)
    // ----------------------------
    if (frameCount < 60) {
        baseline = smoothed;
        info.textContent = "Calibrating ambient light...";
        requestAnimationFrame(loop);
        return;
    }

    // ----------------------------
    // 2. ADAPTIVE NOISE ESTIMATION
    // ----------------------------
    let deviation = Math.abs(smoothed - baseline);
    noise = noise * 0.95 + deviation * 0.05;

    // ----------------------------
    // 3. FLASH DETECTION (adaptive threshold)
    // ----------------------------
    let threshold = baseline + noise * 6;   // adaptive sensitivity

    let now = Date.now();

    if (smoothed > threshold && now - lastBeep > 250) {
        beep();
        lastBeep = now;
        info.textContent = "FLASH DETECTED!";
    } else {
        info.textContent =
            "Baseline: " + baseline.toFixed(1) +
            " | Noise: " + noise.toFixed(2) +
            " | Current: " + smoothed.toFixed(1);
    }

    requestAnimationFrame(loop);
}
</script>

</body>
</html>
