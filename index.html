<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Flash Detector</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #111;
        color: white;
    }

    video {
        width: 90%;
        max-width: 400px;
        margin-top: 20px;
        border: 2px solid #444;
    }

    button {
        font-size: 20px;
        padding: 10px 20px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<h1>LED Flash Detector</h1>

<button onclick="start()">Start</button>

<br>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');

let previousBrightness = 0;
let lastBeep = 0;

let audioCtx = null;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// 🔊 stable beep (Web Audio API)
function beep() {
    if (!audioCtx) return;

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 1000;   // tone frequency (Hz)
    gain.gain.value = 0.2;        // volume

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

// 📷 start rear camera
function start() {

    initAudio(); // unlock audio system

    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "environment"
        }
    })
    .then(stream => {
        video.srcObject = stream;
        requestAnimationFrame(checkFrame);
    })
    .catch(err => {
        alert("Kamera nepovolená: " + err);
    });
}

// 💡 compute brightness
function getBrightness(imageData) {
    let data = imageData.data;
    let sum = 0;

    for (let i = 0; i < data.length; i += 4) {
        sum += 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
    }

    return sum / (data.length / 4);
}

// 🎯 main loop
function checkFrame() {

    if (video.videoWidth === 0) {
        requestAnimationFrame(checkFrame);
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // optional: center crop (more stable for LED detection)
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let brightness = getBrightness(frame);

    // smoothing (VERY important for iPhone stability)
    previousBrightness = previousBrightness * 0.9 + brightness * 0.1;

    let delta = brightness - previousBrightness;
    let now = Date.now();

    // flash detection
    if (delta > 6 && now - lastBeep > 300) {
        beep();
        lastBeep = now;
    }

    requestAnimationFrame(checkFrame);
}
</script>

</body>
</html>
